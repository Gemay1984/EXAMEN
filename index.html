<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipCastellano v2.1 - Fase 1</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- jsQR Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ZipCastellano <span class="version">v2.1</span></h1>
            <p class="subtitle">Fase 1: Scanner QR</p>
        </header>

        <main>
            <div class="scanner-container">
                <video id="video-preview" autoplay playsinline></video>
                <canvas id="hidden-canvas" style="display: none;"></canvas>
                
                <div id="scanner-overlay" class="overlay">
                    <div class="scanner-frame"></div>
                </div>

                <div id="status-indicator" class="status-badge">
                    <span class="status-dot"></span>
                    <span id="status-text">Cámara no iniciada</span>
                </div>
            </div>

            <div class="controls">
                <button id="btn-start" class="btn-primary">Iniciar Cámara</button>
                <button id="btn-stop" class="btn-secondary" style="display: none;">Detener</button>
                <button id="btn-print" class="btn-secondary">Generar Hoja</button>
            </div>

            <div id="result-container" class="result-card" style="display: none;">
                <h3>QR Detectado</h3>
                <div id="qr-data" class="data-box"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 ZipCastellano - Robusto en condiciones reales</p>
        </footer>
    </div>

    <!-- App Modules -->
    <script src="js/printer.js"></script>
    <script src="js/core.js"></script>
    <script src="js/scanner.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
